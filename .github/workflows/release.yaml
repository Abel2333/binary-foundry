name: Release Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create
        required: true
        type: string
  push:
    tags:
      - "assets-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nushell
        uses: hustcer/setup-nu@v3

      - name: Verify Podman
        run: podman --version

      - name: Build all assets
        run: nu build-scripts/run-build.nu --all --release-tag ${{ env.RELEASE_TAG }}

      - name: Generate manifest
        run: nu build-scripts/generate-manifest.nu --release-tag ${{ env.RELEASE_TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/manifest.json
